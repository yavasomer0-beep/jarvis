<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS - Güvenli</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
    body { margin:0; background:#000; color:#0ff; font-family:'Orbitron', sans-serif; height:100vh; overflow:hidden; }
    
    #login { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); display:flex; align-items:center; justify-content:center; z-index:9999; }
    .box { background:#001122; padding:50px; border:3px solid #0ff; border-radius:20px; text-align:center; box-shadow:0 0 60px #0ff; }
    input { padding:20px; width:350px; background:#000; border:2px solid #0ff; color:#0ff; font-size:1.3em; text-align:center; }
    button { padding:18px 60px; background:#0ff; color:#000; border:none; font-size:1.3em; font-weight:bold; cursor:pointer; margin-top:20px; }
    
    .main { display:none; padding:20px; text-align:center; height:100vh; }
    #output { margin:20px auto; max-width:900px; background:#001111; padding:25px; border:1px solid #0ff; border-radius:15px; min-height:300px; text-align:left; font-size:1.25em; line-height:1.6; overflow-y:auto; }
    button.big { font-size:1.6em; padding:25px 80px; margin:20px; }
  </style>
</head>
<body>

  <!-- ŞİFRE EKRANI -->
  <div id="login">
    <div class="box">
      <h1>🔒 JARVIS GÜVENLİ ALAN</h1>
      <p>Patron kimliğini doğrula</p>
      <input type="password" id="pass" placeholder="Şifreni gir" autofocus>
      <br><button onclick="login()">GİRİŞ YAP</button>
      <p id="err" style="color:#f66; margin-top:15px;"></p>
    </div>
  </div>

  <!-- ANA EKRAN -->
  <div id="main" class="main">
    <h1>🟢 JARVIS AKTİF</h1>
    <button onclick="startListening()" class="big">🎤 SESLİ KOMUT VER</button>
    <p style="color:#0a0;">veya <strong>J</strong> tuşuna bas</p>
    <div id="output"></div>
  </div>

  <script>
    const MASTER_PASS = "buraya_kendi_güçlü_şifreni_yaz";   // ← MUTLAKA DEĞİŞTİR!
    const API_KEY = "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";

    let isListening = false;

    function login() {
      if (document.getElementById("pass").value === MASTER_PASS) {
        document.getElementById("login").style.display = "none";
        document.getElementById("main").style.display = "block";
        addMessage("jarvis", "Sistem hazır patron. Hoş geldin.");
      } else {
        document.getElementById("err").innerHTML = "❌ Yanlış şifre!";
      }
    }

    function addMessage(sender, text) {
      const output = document.getElementById("output");
      const p = document.createElement("p");
      p.innerHTML = `<strong>${sender === "user" ? "Sen" : "Jarvis"}:</strong> ${text}`;
      output.appendChild(p);
      output.scrollTop = output.scrollHeight;
    }

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "tr-TR";
    recognition.continuous = false;

    async function startListening() {
      if (isListening) return;
      isListening = true;

      const output = document.getElementById("output");
      addMessage("system", "🔴 Dinliyorum...");
      
      recognition.start();
    }

    recognition.onresult = async (event) => {
      isListening = false;
      const command = event.results[0][0].transcript;
      addMessage("user", command);

      try {
        const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${API_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            model: "openai/gpt-4o-mini",
            messages: [
              { role: "system", content: "Sen Jarvis'sin. Kısa, esprili ve yardımcı cevaplar ver. Türkçe konuş. Emoji kullanma." },
              { role: "user", content: command }
            ],
            max_tokens: 600
          })
        });

        if (!res.ok) throw new Error("API Error");

        const data = await res.json();
        const answer = data.choices[0].message.content;

        addMessage("jarvis", answer);

        const utterance = new SpeechSynthesisUtterance(answer.replace(/[\u{1F000}-\u{1FFFF}]/gu, ""));
        utterance.lang = "tr-TR";
        utterance.rate = 1.05;
        speechSynthesis.speak(utterance);

      } catch (e) {
        console.error(e);
        addMessage("jarvis", "Bağlantı hatası. API key veya internet kontrol et.");
      }
    };

    // Klavye
    document.addEventListener("keypress", e => {
      if (e.key.toLowerCase() === "j") startListening();
    });

    document.getElementById("pass").addEventListener("keypress", e => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
